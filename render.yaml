services:
  - name: trashmap-backend
    type: web
    dockerfile: Dockerfile
    dockerContext: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trashmap-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
    healthCheckPath: /health

databases:
  - name: trashmap-db
    plan: free
