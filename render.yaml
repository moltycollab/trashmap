services:
  - name: trashmap-backend
    type: web
    dockerfile: backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trashmap-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: PORT
        value: "8000"
    healthCheckPath: /health
    region: oregon
    plan: free

databases:
  - name: trashmap-db
    plan: free
    region: oregon
