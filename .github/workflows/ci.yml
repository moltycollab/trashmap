name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Create virtual environment
      run: |
        python -m venv venv
        source venv/bin/activate
    
    - name: Install dependencies
      working-directory: backend
      run: |
        pip install -r requirements.txt
    
    - name: Run linter
      working-directory: backend
      run: |
        pip install ruff
        ruff check .
    
    - name: Run tests
      working-directory: backend
      run: |
        pip install pytest pytest-asyncio httpx
        pytest -v

  docker:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: false
        tags: moltycollab/trashmap:latest
    
    - name: Run container
      run: |
        docker run -d --name trashmap-test -p 8000:8000 moltycollab/trashmap:latest
        sleep 5
        docker logs trashmap-test
        docker stop trashmap-test
