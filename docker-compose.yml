version: '3.8'

services:
  # PostgreSQL + PostGIS
  db:
    image: postgis/postgis:15-3.4
    container_name: trashmap-db
    environment:
      POSTGRES_USER: trashmap
      POSTGRES_PASSWORD: trashmap
      POSTGRES_DB: trashmap
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trashmap"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  backend:
    build: ./backend
    container_name: trashmap-backend
    environment:
      DATABASE_URL: postgresql://trashmap:trashmap@db:5432/trashmap
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (servido por nginx)
  frontend:
    image: nginx:alpine
    container_name: trashmap-frontend
    volumes:
      - ./prototype:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
